; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:seeed_xiao_esp32s3]
platform = espressif32@^6.13.0
board = seeed_xiao_esp32s3
framework = espidf
lib_deps = 
	jgromes/RadioLib@^7.7.1
	majerle/LwGPS@^2.3.0
build_flags =
	-D ESP32
	-D LWGPS_IGNORE_USER_OPTS
	-D LWGPS_CFG_STATEMENT_GPGSV=0
  	-D RADIOLIB_EXCLUDE_CC1101=1
  	-D RADIOLIB_EXCLUDE_NRF24=1
  	-D RADIOLIB_EXCLUDE_RF69=1
  	-D RADIOLIB_EXCLUDE_SX1231=1 ; dependent on RADIOLIB_EXCLUDE_RF69
  	-D RADIOLIB_EXCLUDE_SI443X=1
  	-D RADIOLIB_EXCLUDE_RFM2X=1 ; dependent on RADIOLIB_EXCLUDE_SI443X
  	-D RADIOLIB_EXCLUDE_SX127X=1
  	-D RADIOLIB_EXCLUDE_SX126X=0
  	-D RADIOLIB_EXCLUDE_SX128X=1
  	-D RADIOLIB_EXCLUDE_AFSK=1
  	-D RADIOLIB_EXCLUDE_AX25=1
  	-D RADIOLIB_EXCLUDE_HELLSCHREIBER=1
  	-D RADIOLIB_EXCLUDE_MORSE=1
  	-D RADIOLIB_EXCLUDE_RTTY=1
  	-D RADIOLIB_EXCLUDE_SSTV=1
  	-D RADIOLIB_EXCLUDE_DIRECT_RECEIVE=1
  	-D RADIOLIB_EXCLUDE_BELL=1
  	-D RADIOLIB_EXCLUDE_APRS=1
  	-D RADIOLIB_EXCLUDE_LORAWAN=0
  	-D RADIOLIB_EXCLUDE_LR11X0=1
  	-D RADIOLIB_EXCLUDE_FSK4=1
  	-D RADIOLIB_EXCLUDE_PAGER=1
