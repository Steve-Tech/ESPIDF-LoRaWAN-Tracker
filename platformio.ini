[env:seeed_xiao_esp32s3]
platform = espressif32@^6.13.0
board = seeed_xiao_esp32s3
framework = espidf
lib_deps = jgromes/RadioLib@^7.7.1
build_flags =
  -D RADIOLIB_DEBUG_BASIC
  -D RADIOLIB_DEBUG_PROTOCOL